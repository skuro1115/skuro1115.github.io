<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06080f" />
      <stop offset="0.5" stop-color="#0d1424" />
      <stop offset="1" stop-color="#06080f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.4" />
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)" />
  <rect width="1200" height="1200" fill="url(#glow)" />
  <!-- Content lives in y=285..y=915 (the 630-tall band that becomes the 1200x630 OG crop) -->
  <g transform="translate(0, 285)">
    <g font-family="'DM Mono', ui-monospace, SFMono-Regular, monospace" font-weight="500">
      <text x="80" y="60" fill="#94a3b8" font-size="22" letter-spacing="6">SKURO &#8212; PORTFOLIO</text>
    </g>
    <g font-family="'DM Sans', ui-sans-serif, system-ui, sans-serif" font-weight="700">
      <text x="80" y="200" fill="#ffffff" font-size="92" letter-spacing="-3">Software</text>
      <text x="80" y="300" fill="url(#accent)" font-size="92" letter-spacing="-3">&amp; Ideas.</text>
    </g>
    <g font-family="'DM Sans', ui-sans-serif, system-ui, sans-serif" font-weight="400">
      <text x="80" y="390" fill="#cbd5e1" font-size="28">
        iOS apps &#183; algorithms &#183; VR simulation &#183; tooling
      </text>
    </g>
    <g transform="translate(80, 460)" font-family="'DM Mono', ui-monospace, monospace" font-size="18" font-weight="500">
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#1e293b" stroke="#334155" />
      <text x="90" y="29" fill="#e2e8f0" text-anchor="middle">Apps</text>
      <rect x="200" y="0" width="180" height="44" rx="22" fill="#1e293b" stroke="#334155" />
      <text x="290" y="29" fill="#e2e8f0" text-anchor="middle">Works</text>
      <rect x="400" y="0" width="180" height="44" rx="22" fill="#1e293b" stroke="#334155" />
      <text x="490" y="29" fill="#e2e8f0" text-anchor="middle">Blog</text>
    </g>
    <g transform="translate(940, 260)">
      <circle cx="0" cy="0" r="180" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.4" />
      <circle cx="0" cy="0" r="120" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.28" />
      <circle cx="0" cy="0" r="60" fill="url(#accent)" fill-opacity="0.85" />
      <text x="0" y="18" fill="#ffffff" font-family="'DM Sans', sans-serif" font-size="48" font-weight="800" text-anchor="middle">s</text>
    </g>
  </g>
</svg>
